<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CropsIntel</title>
    <!-- CRITICAL: Kill any V1 Lovable/Workbox service workers BEFORE app loads -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            registration.unregister();
            console.log('[CropsIntel V2] Unregistered old service worker:', registration.scope);
          });
        });
        if ('caches' in window) {
          caches.keys().then(function(cacheNames) {
            cacheNames.forEach(function(cacheName) {
              caches.delete(cacheName);
              console.log('[CropsIntel V2] Deleted cache:', cacheName);
            });
          });
        }
      }
    </script>
    <script>
      // GitHub Pages SPA redirect
      // Stores the path in sessionStorage and redirects to /
      // The SPA router picks up the path from sessionStorage or just uses the URL
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
