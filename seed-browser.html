window.runSeed = async function() {
  document.getElementById('seedBtn').disabled = true;
  l('\\nSeeding CropsIntelV2 database...');
  let inserted = 0;

  for (const r of reports) {
    const record = {
      report_date: `${r.year}-${String(r.month).padStart(2,'0')}-01`,
      report_year: r.year,
      report_month: r.month,
      crop_year: r.crop,
      carry_in_lbs: r.carry,
      receipts_lbs: r.receipts,
      total_supply_lbs: r.supply,
      domestic_shipped_lbs: r.dom_ship,
      export_shipped_lbs: r.exp_ship,
      total_shipped_lbs: r.total_ship,
      domestic_committed_lbs: r.dom_commit,
      export_committed_lbs: r.exp_commit,
      total_committed_lbs: r.total_commit,
      domestic_new_commitments_lbs: r.dom_new,
      export_new_commitments_lbs: r.exp_new,
      total_new_commitments_lbs: r.total_new,
      uncommitted_lbs: r.uncommit,
      raw_data: { source: 'seed', seeded_at: new Date().toISOString() },
      source_pdf: 'seed-data'
    };

    const { error } = await supabase
      .from('abc_position_reports')
      .upsert(record, { onConflict: 'report_year,report_month' });

    if (error) {
      l(`FAIL ${r.year}/${r.month}: ${error.message}`);
    } else {
      inserted++;
      l(`OK ${r.year}/${String(r.month).padStart(2,'0')} (${r.crop}) supply:${(r.supply/M).toFixed(0)}M shipped:${(r.total_ship/M).toFixed(0)}M`);
    }
  }

  l(`\\nSeeded ${inserted} of ${reports.length} position reports.`);

  // Now run YoY calculations
  l('\\nCalculating YoY comparisons...');
  const { data: allReports } = await supabase
    .from('abc_position_reports')
    .select('*')
    .order('report_year', { ascending: true })
    .order('report_month', { ascending: true });

  if (allReports && allReports.length > 0) {
    let yoyCount = 0;
    for (const current of allReports) {
      const prior = allReports.find(r =>
        r.report_month === current.report_month &&
        r.report_year === current.report_year - 1
      );
      if (!prior) continue;

      const pctChange = (curr, prev) => prev > 0 ? ((curr - prev) / prev * 100).toFixed(1) : null;

      const analysis = {
        analysis_type: 'yoy_comparison',
        report_year: current.report_year,
        report_month: current.report_month,
        title: `YoY ${current.report_year}/${String(current.report_month).padStart(2,'0')} vs ${prior.report_year}`,
        summary: `Shipments ${pctChange(current.total_shipped_lbs, prior.total_shipped_lbs)}% | Committed ${pctChange(current.total_committed_lbs, prior.total_committed_lbs)}% | Supply ${pctChange(current.total_supply_lbs, prior.total_supply_lbs)}%`,
        confidence: 0.95,
        data: {
          current_year: current.report_year,
          prior_year: prior.report_year,
          month: current.report_month,
          shipments_change: pctChange(current.total_shipped_lbs, prior.total_shipped_lbs),
          committed_change: pctChange(current.total_committed_lbs, prior.total_committed_lbs),
          supply_change: pctChange(current.total_supply_lbs, prior.total_supply_lbs),
          uncommitted_change: pctChange(current.uncommitted_lbs, prior.uncommitted_lbs)
        }
      };

      const { error } = await supabase.from('ai_analyses').upsert(analysis, {
        onConflict: 'analysis_type,report_year,report_month'
      });
      if (!error) yoyCount++;
    }
    l(`Generated ${yoyCount} YoY comparisons.`);

    // Trade signal for latest month
    const latest = allReports[allReports.length - 1];
    const prev = allReports[allReports.length - 2];
    if (latest && prev) {
      const shipTrend = latest.total_shipped_lbs > prev.total_shipped_lbs ? 'up' : 'down';
      const commitTrend = latest.total_committed_lbs < prev.total_committed_lbs ? 'declining' : 'growing';
      const uncommitTrend = latest.uncommitted_lbs > prev.uncommitted_lbs ? 'rising' : 'falling';

      let signal = 'neutral';
      let reasoning = '';
      if (shipTrend === 'up' && commitTrend === 'declining') {
        signal = 'bearish';
        reasoning = 'Shipments increasing but commitments declining suggests demand may be peaking. Uncommitted inventory ' + uncommitTrend + '.';
      } else if (shipTrend === 'up' && commitTrend === 'growing') {
        signal = 'bullish';
        reasoning = 'Both shipments and commitments trending up indicates strong demand. Uncommitted inventory ' + uncommitTrend + '.';
      } else {
        reasoning = `Shipments ${shipTrend}, commitments ${commitTrend}, uncommitted ${uncommitTrend}. Mixed signals.`;
      }

      await supabase.from('ai_analyses').upsert({
        analysis_type: 'trade_signal',
        report_year: latest.report_year,
        report_month: latest.report_month,
        title: `Trade Signal: ${signal.toUpperCase()} (${latest.report_year}/${String(latest.report_month).padStart(2,'0')})`,
        summary: reasoning,
        confidence: 0.72,
        data: { signal, shipTrend, commitTrend, uncommitTrend }
      }, { onConflict: 'analysis_type,report_year,report_month' });
      l(`Trade signal: ${signal.toUpperCase()}`);
    }

    // Monthly brief for latest
    if (latest) {
      const fmtM = (v) => (v/M).toFixed(0) + 'M lbs';
      await supabase.from('ai_analyses').upsert({
        analysis_type: 'monthly_brief',
        report_year: latest.report_year,
        report_month: latest.report_month,
        title: `Monthly Brief: ${latest.crop_year} Crop (${latest.report_year}/${String(latest.report_month).padStart(2,'0')})`,
        summary: `Supply: ${fmtM(latest.total_supply_lbs)} | Shipped: ${fmtM(latest.total_shipped_lbs)} | Committed: ${fmtM(latest.total_committed_lbs)} | Uncommitted: ${fmtM(latest.uncommitted_lbs)}. ${((latest.total_shipped_lbs + latest.total_committed_lbs) / latest.total_supply_lbs * 100).toFixed(1)}% of supply is sold or committed.`,
        confidence: 0.98,
        data: { supply: latest.total_supply_lbs, shipped: latest.total_shipped_lbs, committed: latest.total_committed_lbs, uncommitted: latest.uncommitted_lbs }
      }, { onConflict: 'analysis_type,report_year,report_month' });
      l('Monthly brief generated.');
    }
  }

  l('\\n=== SEEDING COMPLETE ===');
  l('Refresh cropsintel.net to see the data!');
  document.getElementById('seedBtn').disabled = false;
  document.getElementById('seedBtn').textContent = 'Done!';
};
